services:
  postgres:
    image: postgres:16-alpine
    container_name: foorest-postgres
    environment:
      POSTGRES_DB: foorest
      POSTGRES_USER: foorest
      POSTGRES_PASSWORD: foorest_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U foorest']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: foorest-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: foorest-backend
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://foorest:foorest_dev@postgres:5432/foorest
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-access-secret-change-in-prod
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-prod
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      AWS_REGION: us-east-1
      AWS_SNS_ENABLED: 'false'
      ALLOWED_ORIGINS: http://localhost:3000
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../foorest-frontend
      dockerfile: Dockerfile.dev
    container_name: foorest-frontend
    ports:
      - '3000:3000'
    environment:
      VITE_API_URL: http://localhost:3001/graphql
      VITE_WS_URL: ws://localhost:3001/graphql
    volumes:
      - ../foorest-frontend/src:/app/src
      - ../foorest-frontend/index.html:/app/index.html

volumes:
  postgres_data:
  redis_data:
